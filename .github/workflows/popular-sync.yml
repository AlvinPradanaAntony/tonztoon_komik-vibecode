# ======================================================
# Tonztoon Komik — Popular Feed Sync GitHub Actions Workflow
# ======================================================
# Trigger:
#   1. Cron job populer (terjadwal harian)
#   2. workflow_dispatch manual untuk popular sync

name: "🔥 Scraper: Popular Sync"

on:
  schedule:
    # Jalankan 1x sehari di jam yang berbeda dari latest cron
    - cron: "30 1 * * *"

  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Source that triggered this workflow"
        required: false
        default: "manual"
      popular_pages:
        description: "Jumlah halaman popular yang ingin disinkronkan"
        required: false
        default: "10"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-popular:
    name: Run Popular Feed Sync
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 🌐 Install Scrapling browser dependencies
        run: scrapling install

      - name: 🔥 Run popular sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POPULAR_PAGES: ${{ github.event.inputs.popular_pages || '10' }}
        run: |
          cd backend
          python -m scraper.main --max-pages 0 --popular-pages ${POPULAR_PAGES}

      - name: 📝 Log completion
        if: always()
        run: echo "Popular sync workflow finished at $(date -u)"
